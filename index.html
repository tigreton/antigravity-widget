<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo Widget Flotante</title>
    
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS (assuming you are using Bootstrap 5, but works with 4 as well) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="widget.css">
</head>
<body>

    <!-- Main Page Content -->
    <div class="container text-center mt-5">
        <h1>Mi Página Principal</h1>
        <p class="lead">Esta es una página de ejemplo que usa Bootstrap y jQuery.</p>
        <p>El widget aparecerá abajo a la derecha de la pantalla.</p>
        
        <div class="mt-4">
            <h4>Elige el tipo de widget:</h4>
            <button id="btnModeNews" class="btn btn-primary me-2"><i class="fa-solid fa-newspaper"></i> Widget Noticias</button>
            <button id="btnModeGame" class="btn btn-success"><i class="fa-solid fa-gamepad"></i> Widget Juego (Pou)</button>
        </div>
    </div>

    <!-- Floating Widget Container -->
    <div class="floating-widget-container">
        
        <!-- Open Widget Panel -->
        <div id="widgetPanel" class="widget-panel">
            <div class="widget-header">
                <div class="widget-title-area">
                    <i id="widgetIcon" class="fa-solid fa-bolt"></i>
                    <span id="widgetTitle">Super Noticia</span>
                </div>
                <button id="widgetCloseBtn" class="close-btn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="widget-body">
                <!-- Content goes here: HTML, CSS, JS -->
                <div id="widgetContent">
                    <!-- Dynamic content will be populated by JS -->
                </div>
            </div>
        </div>

        <!-- Closed Widget Button -->
        <button id="widgetToggleBtn" class="widget-toggle-btn">
            <i class="fa-solid fa-comment-dots"></i>
            Nuevo Memo
        </button>

    </div>


    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="widget.js"></script>
</body>
</html>
